<!doctype html>
<html><head><meta charset="utf-8"><title>Wales test</title>
<style>
body{background:oklch(88% 0.04 72);padding:40px;font-family:system-ui;display:flex;gap:40px;}

.m1{width:60px;height:78px;background:oklch(46% 0.16 148);-webkit-mask:url('mopkqz2n-149314.svg') center/contain no-repeat;mask:url('mopkqz2n-149314.svg') center/contain no-repeat;}
.m2{width:60px;height:78px;background:oklch(46% 0.16 148);-webkit-mask-image:url('mopkqz2n-149314.svg');mask-image:url('mopkqz2n-149314.svg');-webkit-mask-size:contain;mask-size:contain;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;-webkit-mask-position:center;mask-position:center;}
.img{width:60px;height:78px;object-fit:contain;}
</style></head>
<body>
<div class="box"><div class="m1"></div><code>mask shorthand</code></div>
<div class="box"><div class="m2"></div><code>mask longhand</code></div>
<div class="box"><img class="img" src="mopkqz2n-149314.svg" alt="raw"><code>raw &lt;img&gt;</code></div>
