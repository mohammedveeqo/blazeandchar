<!doctype html>
<html><head><meta charset="utf-8"><title>Iframe test</title>
<style>
body{background:#222;color:#fff;font-family:sans-serif;padding:20px;margin:0;}
h3{margin:0 0 8px;font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:#aaa;}
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin:16px 0 40px;}
.col{background:#333;padding:12px;border-radius:8px;}
.frame{width:100%;aspect-ratio:130/208;background:#000;border:1px dashed #f70;}
iframe{width:100%;height:100%;border:0;display:block;}
.label{font-size:10px;color:#888;margin-bottom:6px;}
</style></head><body>
<h1>Canonical pouch iframe diagnostic</h1>

<h3>1. Standalone canonical (no query)</h3>
<div class="row">
<div class="col">
<div class="label">aspect-ratio 130/208, width 100%</div>
<div class="frame" style="max-width:420px;"><iframe src="blaze-pouch-v7-final.html"></iframe></div>
</div>
</div>

<h3>2. ?mode=front-only&sku=tandoori</h3>
<div class="row">
<div class="col">
<div class="label">max-width 420px (hero size)</div>
<div class="frame" style="max-width:420px;"><iframe src="blaze-pouch-v7-final.html?mode=front-only&sku=tandoori"></iframe></div>
</div>
<div class="col">
<div class="label">max-width 300px</div>
<div class="frame" style="max-width:300px;"><iframe src="blaze-pouch-v7-final.html?mode=front-only&sku=tandoori"></iframe></div>
</div>
<div class="col">
<div class="label">max-width 200px</div>
<div class="frame" style="max-width:200px;"><iframe src="blaze-pouch-v7-final.html?mode=front-only&sku=tandoori"></iframe></div>
</div>
</div>

<h3>3. ?mode=front-only&sku=masala</h3>
<div class="row">
<div class="col">
<div class="label">max-width 420px (hero size)</div>
<div class="frame" style="max-width:420px;"><iframe src="blaze-pouch-v7-final.html?mode=front-only&sku=masala"></iframe></div>
</div>
</div>
</body></html>
